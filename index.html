<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./src.js"></script>
</head>

<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>

        <div class="score">
            <p class="player">Player score: <span>0</span></p>
            <p class="computer">Computer score: <span>0</span></p>
        </div>


        <div class="game-buttons">
            <button>Rock</button>
            <button>Paper</button>
            <button>Scissors</button>
        </div>

    <div id="round-outcome"></div>
    <div id="game-outcome"></div>
</div>
</body>

</html>
